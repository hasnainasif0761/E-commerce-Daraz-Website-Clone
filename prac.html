<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>App Download Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-100">

<div class="w-[300px] bg-white rounded-lg shadow-md overflow-hidden">

  <!-- Top Gradient Section -->
  <div class="bg-gradient-to-b from-orange-400 to-pink-500 p-4 text-white relative">

    <!-- Rating -->
    <div class="absolute top-2 left-2 bg-orange-500 text-sm px-3 py-1 rounded-full flex items-center gap-1">
      ⭐ 4.8 Rated
    </div>

    <!-- Title -->
    <h2 class="text-xl font-bold text-center mt-6 mb-4">
      Download the App now
    </h2>

    <!-- Features -->
    <div class="space-y-4">

      <!-- Free Shipping -->
      <div class="flex items-center gap-3">
        <div class="bg-white/80 p-3 rounded-xl">
          🚚
        </div>
        <span class="text-lg font-semibold">Free Shipping</span>
      </div>

      <!-- Vouchers -->
      <div class="flex items-center gap-3">
        <div class="bg-white/80 p-3 rounded-xl">
          %
        </div>
        <span class="text-lg font-semibold">Exclusive Vouchers</span>
      </div>

    </div>

  </div>

  <!-- Bottom Section -->
  <div class="p-4 bg-gray-100 flex gap-3">

    <!-- QR -->
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=AppDownload"
      class="w-[120px] h-[120px]" />

    <!-- Buttons -->
    <div class="flex flex-col justify-center gap-3">

      <button class="border rounded-lg px-4 py-2 flex items-center gap-2 bg-white">
        🍎 App Store
      </button>

      <button class="border rounded-lg px-4 py-2 flex items-center gap-2 bg-white">
        ▶ Google Play
      </button>

    </div>

  </div>

  <!-- Footer -->
  <div class="text-sm p-2 text-gray-600 font-semibold">
    Download the App Now!
  </div>

</div>

</body>
</html>
